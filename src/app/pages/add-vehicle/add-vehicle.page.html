<ion-header>
  <ion-toolbar>
    <ion-title>Add Vehicle</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <ion-card-header>
      <ion-card-title>Vehicle Information</ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <ion-item>
        <ion-label position="floating">Make *</ion-label>
        <ion-select [(ngModel)]="vehicle.make" (ionChange)="onMakeChange()">
          <ion-select-option *ngFor="let make of makes" [value]="make">
            {{ make }}
          </ion-select-option>
        </ion-select>
      </ion-item>
      
      <ion-item>
        <ion-label position="floating">Model *</ion-label>
        <ion-select [(ngModel)]="vehicle.model" [disabled]="!models.length">
          <ion-select-option *ngFor="let model of models" [value]="model">
            {{ model }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Year *</ion-label>
        <ion-select [(ngModel)]="vehicle.year">
          <ion-select-option *ngFor="let year of years" [value]="year">
            {{ year }}
          </ion-select-option>
        </ion-select>
      </ion-item>
      <ion-item>
        <ion-label position="floating">State *</ion-label>
        <ion-select [(ngModel)]="vehicle.state">
          <ion-select-option *ngFor="let s of states" [value]="s.code">
            {{ s.name }} ({{ s.code }})
          </ion-select-option>
        </ion-select>
      </ion-item>
      <ion-item>
        <ion-label position="floating">License Plate *</ion-label>
        <ion-input
          [(ngModel)]="vehicle.licensePlate"
          (ionInput)="onLicensePlateInput($event)"
          maxlength="10"
          placeholder="ABC1234">
        </ion-input>
        <ion-button expand="block" (click)="scanPlate()">
          Scan License Plate
        </ion-button>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Classification</ion-label>
        <ion-select [(ngModel)]="vehicle.classification">
          <ion-select-option value="Sedan">Sedan</ion-select-option>
          <ion-select-option value="SUV">SUV</ion-select-option>
          <ion-select-option value="Truck">Truck</ion-select-option>
          <ion-select-option value="Van">Van</ion-select-option>
          <ion-select-option value="Motorcycle">Motorcycle</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-button expand="block" class="ion-margin-top" (click)="saveVehicle()">
        Save Vehicle
      </ion-button>
      <ion-button expand="block" class="ion-margin-top" (click)="goBack()">
        Go Back
      </ion-button>
    </ion-card-content>
  </ion-card>

</ion-content>
