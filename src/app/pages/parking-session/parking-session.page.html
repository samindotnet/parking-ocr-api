<ion-header>
  <ion-toolbar>
    <ion-item lines="none">
      <ion-label>
        <h2>Parking Price</h2>
        <p>$15 flat rate</p>
      </ion-label>
    </ion-item>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Start Parking Session</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <ion-card-header>
      <ion-card-title>Select Vehicle</ion-card-title>
    </ion-card-header>

    <ion-card-content>

      <ion-item>
        <ion-label>Vehicle</ion-label>
        <ion-select [(ngModel)]="selectedVehicleId" placeholder="Choose vehicle">
          <ion-select-option *ngFor="let vehicle of vehicles" [value]="vehicle.id">
            {{ vehicle.make }} {{ vehicle.model }} - {{ vehicle.licensePlate }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <ion-button
        expand="block"
        class="ion-margin-top"
        [disabled]="isLoading || !selectedVehicleId"
        (click)="startSession()">
        Start Session
      </ion-button>

      <ion-button
        expand="block"
        fill="outline"
        class="ion-margin-top"
        (click)="goBack()">
        Go Back
      </ion-button>

    </ion-card-content>
  </ion-card>

  <ion-text color="medium" *ngIf="!vehicles.length">
    <p class="ion-text-center ion-margin-top">
      No vehicles available. Add a vehicle first.
    </p>
  </ion-text>

</ion-content>
