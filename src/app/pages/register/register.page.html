<ion-header>
  <ion-toolbar>
    <ion-title>Register</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input
      type="email"
      placeholder="Email"
      [(ngModel)]="email">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      type="password"
      placeholder="Password"
      [(ngModel)]="password">
    </ion-input>
  </ion-item>

  <ion-button expand="block" (click)="register()">
    Register
  </ion-button>

  <ion-button expand="block" fill="clear" (click)="goToLogin()">
    Already have an account?
  </ion-button>

</ion-content>
